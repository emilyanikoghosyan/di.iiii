server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket — must be matched before the broader /serverXR/ block
    location /serverXR/socket.io/ {
        proxy_pass http://server:4000/serverXR/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # Backend API
    location /serverXR/ {
        proxy_pass http://server:4000/serverXR/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 110m;
    }

    # SPA — all other paths fall through to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
