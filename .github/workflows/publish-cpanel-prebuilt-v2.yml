name: Publish cPanel Release (Canonical)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source branch or ref to build from
        required: true
        default: main
      deploy_env:
        description: Target prebuilt environment branch
        required: true
        type: choice
        options:
          - production
        default: production

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    env:
      SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref_name }}
      DEPLOY_ENV: production
      TARGET_BRANCH: cpanel-production
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate cPanel backend compatibility
        run: node scripts/check-cpanel-compat.mjs --deploy-env "${DEPLOY_ENV}"

      - name: Install server dependencies
        run: |
          if [ -f serverXR/package-lock.json ]; then
            npm --prefix serverXR ci
          else
            npm --prefix serverXR install
          fi

      - name: Run lint
        run: npm run lint

      - name: Run automated tests
        run: npm test

      - name: Stage cPanel release
        env:
          VITE_API_BASE_URL: /serverXR
          VITE_API_TOKEN: ${{ secrets.SERVERXR_API_TOKEN }}
        run: node scripts/stage-cpanel-nodeapp-release.mjs

      - name: Publish target branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CONTENT_DIR="$(mktemp -d)"
          BRANCH_DIR="$(mktemp -d)"
          rsync -az \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='serverXR/node_modules' \
            --exclude='dist' \
            --exclude='.deploy' \
            ./ "${CONTENT_DIR}/"
          mkdir -p "${CONTENT_DIR}/.deploy"
          cp -R .deploy/cpanel "${CONTENT_DIR}/.deploy/cpanel"
          cp deploy/cpanel/cpanel.prebuilt.yml "${CONTENT_DIR}/.cpanel.yml"
          rm -f "${CONTENT_DIR}/deploy/cpanel/cpanel.prebuilt.yml"
          printf '%s\n' "${SOURCE_REF}" > "${CONTENT_DIR}/.cpanel-source-ref"
          printf '%s\n' "${DEPLOY_ENV}" > "${CONTENT_DIR}/.cpanel-deploy-env"

          cd "${BRANCH_DIR}"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git fetch --depth=1 origin "${TARGET_BRANCH}"; then
            git checkout -B "${TARGET_BRANCH}" FETCH_HEAD
            git rm -r --ignore-unmatch .
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          else
            git checkout --orphan "${TARGET_BRANCH}"
          fi

          rsync -az "${CONTENT_DIR}/" ./
          git add -A .
          git add -f .deploy .cpanel.yml .cpanel-source-ref .cpanel-deploy-env
          if git diff --cached --quiet; then
            echo "No cPanel release changes to publish."
          else
            git commit -m "Publish production cPanel prebuilt from ${SOURCE_REF}"
            git push origin "HEAD:${TARGET_BRANCH}"
          fi
