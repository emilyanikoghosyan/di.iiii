name: Release Bundles

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        run: |
          if [ -f serverXR/package-lock.json ]; then
            npm --prefix serverXR ci
          else
            npm --prefix serverXR install
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Stage cPanel release
        env:
          VITE_API_BASE_URL: /serverXR
        run: npm run deploy:cpanel

      - name: Zip dist
        run: |
          cd .deploy/cpanel/public_html
          zip -r ../../../dist.zip .

      - name: Zip cPanel release
        run: |
          cd .deploy/cpanel
          zip -r ../../cpanel-release.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist.zip
            cpanel-release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
