name: Sync public br_id_ge

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout di.iiii
        uses: actions/checkout@v4

      - name: Checkout br_id_ge
        uses: actions/checkout@v4
        with:
          repository: dob-0/br_id_ge
          ref: ${{ github.ref_name }}
          token: ${{ secrets.BR_ID_GE_SYNC_TOKEN }}
          path: br_id_ge-public

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sync script
        run: node scripts/sync-public-br-id-ge.mjs --dest br_id_ge-public

      - name: Commit and push to br_id_ge
        working-directory: br_id_ge-public
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to sync."
            exit 0
          fi
          git commit -m "sync: from di.iiii@${{ github.ref_name }} (${{ github.sha }})"
          git push origin ${{ github.ref_name }}
