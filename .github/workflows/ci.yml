name: CI

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        run: |
          if [ -f serverXR/package-lock.json ]; then
            npm --prefix serverXR ci
          else
            npm --prefix serverXR install
          fi

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test

      # Explicit guards: these suites are already covered by `npm run test`
      # (the root vitest config globs serverXR/src/**). Re-running them as named
      # steps keeps the schema-drift / prod-503 contract guard visible in CI logs
      # and resilient to a future change to the vitest include glob.
      - name: Server contract tests
        run: npm run test:server-contracts

      - name: Schema-sync tests
        run: npm run test:schema-sync

      - name: Check AI docs
        run: npm run docs:ai:check
