name: Auto-open PR to upstream dev

# Template for contributor forks (Mode 0 in docs/ai/parallel-agents.md).
# Copy this file into YOUR FORK at .github/workflows/auto-pr.yml — it does nothing
# useful sitting in the upstream repo, since it needs to push from your fork.
#
# What it does: every time you push to a branch (other than dev/main) in your
# fork, it opens a PR against dob-0/di.iiii's dev branch if one doesn't already
# exist for that branch, or just leaves the existing one updated (pushing more
# commits to the same branch updates the open PR automatically — GitHub does
# that part for free, no action needed for updates).
#
# Setup required once, in YOUR FORK's repo settings:
#   1. Settings -> Secrets and variables -> Actions -> New repository secret
#   2. Name: UPSTREAM_PR_TOKEN
#   3. Value: a GitHub personal access token (fine-grained, with "Pull requests:
#      write" and "Contents: read" on dob-0/di.iiii) or a classic token with
#      "repo" scope. The default GITHUB_TOKEN cannot open PRs on a different
#      repo, which is why this step is required.

on:
  push:
    branches-ignore:
      - dev
      - main

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Open PR against upstream dev if none exists
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"

          existing=$(gh pr list --repo dob-0/di.iiii --head "${OWNER}:${BRANCH}" --state open --json number --jq '.[0].number')

          if [ -n "$existing" ]; then
            echo "PR #$existing already open for ${OWNER}:${BRANCH} — nothing to do."
            exit 0
          fi

          gh pr create \
            --repo dob-0/di.iiii \
            --base dev \
            --head "${OWNER}:${BRANCH}" \
            --title "${BRANCH}" \
            --body "Auto-opened from fork branch \`${BRANCH}\`. See commits for details."
